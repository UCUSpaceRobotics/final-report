# =============================================================================
# CI for the ERC 2026 Final Report
#   build      : compile the PDF with latexmk, upload it as an artifact
#                (reviewers can check the rest of the document beyond the
#                PR's own screenshot)
#   page-count : effective page count vs the 35-page limit (warn now, hard
#                fail at freeze week - flip the marked line)
#   lint       : placeholder patterns must not reach main ("\todo" joins the
#                list at freeze week); bare \ref{} is forbidden, \autoref only
#   publish    : on push to main only (releases), publish the compiled PDF to
#                GitHub Pages so there's always a stable URL for the latest
#                released report. Requires a one-time manual step: repo
#                Settings -> Pages -> Build and deployment -> Source ->
#                "GitHub Actions".
# =============================================================================
name: build

on:
  push:
    branches: [main] # only for the publish job (GitHub Pages on release) -
                      # everything else runs off pull_request to avoid
                      # double-running CI on a branch that also has an open PR
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Compile PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile with latexmk
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Upload compiled PDF
        uses: actions/upload-artifact@v4
        with:
          name: report-pdf
          path: main.pdf

      - name: Page count vs 35-page limit
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils
          total=$(pdfinfo main.pdf | awk '/^Pages:/{print $2}')
          # The Rules exclude the cover and ToC/LoF/LoT from the limit.
          # Adjust NON_COUNTED when the ToC grows beyond one page.
          NON_COUNTED=2   # 1 cover + 1 ToC page
          effective=$(( total - NON_COUNTED ))
          echo "Total: ${total} pages; effective (minus cover/ToC): ${effective} / 35"
          if [ "${effective}" -gt 35 ]; then
            echo "::warning::Report is ${effective} effective pages - over the 35-page limit."
            # exit 1   # <- enable at freeze week (Phase 5)
          fi

  lint:
    name: Placeholder lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for placeholder patterns
        run: |
          fail=0
          files=$(find sections tables teams -name '*.tex'; ls main.tex preamble.tex metadata.tex)
          for f in $files; do
            # strip LaTeX comments (unescaped %) so commented examples don't trip the lint
            stripped=$(sed 's/\(^\|[^\\]\)%.*/\1/' "$f")
            for pat in '[X]' '[Add content' '\lipsum'; do
              if printf '%s\n' "$stripped" | grep -Fq -- "$pat"; then
                echo "::error file=${f}::placeholder \"${pat}\" found - replace with real content"
                fail=1
              fi
            done
            # \todo joins the lint at freeze week (Phase 5) - uncomment then:
            # if printf '%s\n' "$stripped" | grep -Fq -- '\todo'; then
            #   echo "::error file=${f}::\\todo left in content"
            #   fail=1
            # fi

            # \ref is forbidden - always use \autoref instead (it inserts
            # the name automatically: "Figure", "Table", "\S", ...).
            # Strip allowed \autoref{...}/\pageref{...} first, then check
            # whether a bare \ref{ remains.
            scrubbed=$(printf '%s\n' "$stripped" | sed -E 's/\\(auto|page)ref\{[^}]*\}//g')
            if printf '%s\n' "$scrubbed" | grep -Fq -- '\ref{'; then
              echo "::error file=${f}::bare \\ref{} found - use \\autoref instead"
              fail=1
            fi
          done
          exit $fail

  publish:
    name: Publish PDF to GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download compiled PDF
        uses: actions/download-artifact@v4
        with:
          name: report-pdf
          path: site

      - name: Build Pages site
        run: |
          mv site/main.pdf site/report.pdf
          cat > site/index.html <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>UCU Space Robotics - ERC 2026 Final Report</title>
          </head>
          <body>
            <h1>ERC 2026 Final Report</h1>
            <p>Latest release build (commit ${GITHUB_SHA}).</p>
            <p><a href="report.pdf">Download PDF</a></p>
            <iframe src="report.pdf" style="width:100%;height:90vh;border:none;"></iframe>
          </body>
          </html>
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
